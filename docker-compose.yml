version: '3.9'

services:
  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: brainsuite_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-brainsuite}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-brainsuite_dev}
      POSTGRES_DB: ${POSTGRES_DB:-platform_connectors}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-brainsuite} -d ${POSTGRES_DB:-platform_connectors}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: brainsuite_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO (S3-compatible object storage) ────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: brainsuite_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: brainsuite_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-brainsuite}:${POSTGRES_PASSWORD:-brainsuite_dev}@db:5432/${POSTGRES_DB:-platform_connectors}
      SYNC_DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-brainsuite}:${POSTGRES_PASSWORD:-brainsuite_dev}@db:5432/${POSTGRES_DB:-platform_connectors}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-32-char-random-string}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:-}
      BACKEND_CORS_ORIGINS: '["http://localhost:4200","http://localhost:80","http://frontend"]'

      # Application URL
      BASE_URL: ${BASE_URL:-http://localhost:8000}
      SCHEDULER_STARTUP_DELAY_SECONDS: ${SCHEDULER_STARTUP_DELAY_SECONDS:-0}

      # Redis
      REDIS_URL: redis://redis:6379/0

      # Object Storage (S3/MinIO)
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-http://localhost:9000}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-brainsuite-assets}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin123}
      AWS_REGION: ${AWS_REGION:-us-east-1}

      # Meta Platform
      META_APP_ID: ${META_APP_ID:-}
      META_APP_SECRET: ${META_APP_SECRET:-}
      META_REDIRECT_URI: ${META_REDIRECT_URI:-http://localhost:8000/api/v1/platforms/oauth/callback/meta}

      # TikTok Platform
      TIKTOK_APP_ID: ${TIKTOK_APP_ID:-}
      TIKTOK_APP_SECRET: ${TIKTOK_APP_SECRET:-}
      TIKTOK_REDIRECT_URI: ${TIKTOK_REDIRECT_URI:-http://localhost:8000/api/v1/platforms/oauth/callback/tiktok}

      # Google / YouTube
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8000/api/v1/platforms/oauth/callback/google}
      GOOGLE_DEVELOPER_TOKEN: ${GOOGLE_DEVELOPER_TOKEN:-}
      YOUTUBE_COOKIES: ${YOUTUBE_COOKIES:-}
      YOUTUBE_COOKIES_BACKUP: ${YOUTUBE_COOKIES_BACKUP:-}

      # BrainSuite
      BRAINSUITE_CLIENT_ID: ${BRAINSUITE_CLIENT_ID:-}
      BRAINSUITE_CLIENT_SECRET: ${BRAINSUITE_CLIENT_SECRET:-}
      BRAINSUITE_BASE_URL: ${BRAINSUITE_BASE_URL:-https://api.brainsuite.ai}
      BRAINSUITE_AUTH_URL: ${BRAINSUITE_AUTH_URL:-https://auth.brainsuite.ai/oauth2/token}

      # Environment
      CURRENT_ENV: ${CURRENT_ENV:-production}

      # Dev credentials (active when CURRENT_ENV=development)
      DEV_META_APP_ID: ${DEV_META_APP_ID:-}
      DEV_META_APP_SECRET: ${DEV_META_APP_SECRET:-}
      DEV_TIKTOK_APP_ID: ${DEV_TIKTOK_APP_ID:-}
      DEV_TIKTOK_APP_SECRET: ${DEV_TIKTOK_APP_SECRET:-}
      DEV_GOOGLE_CLIENT_ID: ${DEV_GOOGLE_CLIENT_ID:-}
      DEV_GOOGLE_CLIENT_SECRET: ${DEV_GOOGLE_CLIENT_SECRET:-}
      DEV_GOOGLE_DEVELOPER_TOKEN: ${DEV_GOOGLE_DEVELOPER_TOKEN:-}
      DEV_DV360_CLIENT_ID: ${DEV_DV360_CLIENT_ID:-}
      DEV_DV360_CLIENT_SECRET: ${DEV_DV360_CLIENT_SECRET:-}
      DEV_BRAINSUITE_CLIENT_ID: ${DEV_BRAINSUITE_CLIENT_ID:-}
      DEV_BRAINSUITE_CLIENT_SECRET: ${DEV_BRAINSUITE_CLIENT_SECRET:-}
      DEV_BRAINSUITE_BASE_URL: ${DEV_BRAINSUITE_BASE_URL:-}
      DEV_BRAINSUITE_AUTH_URL: ${DEV_BRAINSUITE_AUTH_URL:-}

      # Currency
      EXCHANGE_RATE_API_KEY: ${EXCHANGE_RATE_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: brainsuite_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
    name: brainsuite_postgres_data
  minio_data:
    name: brainsuite_minio_data
